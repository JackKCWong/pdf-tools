<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Viewer with Pagination</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-right: 5px;
    }
    button:hover {
      background-color: #45a049;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #pdf-container {
      margin-top: 20px;
      border: 1px solid #ddd;
      text-align: center;
      padding: 20px;
    }
    canvas {
      max-width: 100%;
      margin: 0 auto;
    }
    .pagination {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .pagination input {
      width: 60px;
      text-align: center;
      margin: 0 10px;
    }
    .page-info {
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDF Viewer with Pagination</h1>
    <div class="form-group">
      <label for="pdf-file">Select PDF file:</label>
      <select id="pdf-file" name="pdf-file">
        <option value="">-- Select a file --</option>
      </select>
    </div>
    <div class="form-group">
      <label for="file-upload">Upload PDF file:</label>
      <input type="file" id="file-upload" accept=".pdf">
      <button id="upload-button">Upload</button>
    </div>
    <div class="form-group">
      <h3>Bounding Box</h3>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
        <div>
          <label for="top-left">Top-left (x, y):</label>
          <input type="text" id="top-left" placeholder="e.g., 100, 200">
        </div>
        <div>
          <label for="top-right">Top-right (x, y):</label>
          <input type="text" id="top-right" placeholder="e.g., 300, 200">
        </div>
        <div>
          <label for="bottom-left">Bottom-left (x, y):</label>
          <input type="text" id="bottom-left" placeholder="e.g., 100, 400">
        </div>
        <div>
          <label for="bottom-right">Bottom-right (x, y):</label>
          <input type="text" id="bottom-right" placeholder="e.g., 300, 400">
        </div>
      </div>
      <div style="margin-top: 10px;">
        <label for="unified-coords">Unified Coordinates [x1, y1, x2, y2, x3, y3, x4, y4]:</label>
        <input type="text" id="unified-coords" placeholder="e.g., 100, 200, 300, 200, 100, 400, 300, 400" style="width: 100%;">
      </div>
    </div>
    <div class="pagination">
      <button id="prev-page" disabled>Previous</button>
      <span class="page-info">Page <span id="current-page">1</span> of <span id="total-pages">0</span></span>
      <input type="number" id="page-input" value="1" min="1">
      <button id="next-page" disabled>Next</button>
    </div>
    <div id="pdf-metadata" style="margin-top: 20px; padding: 15px; border: 1px solid #ddd; background-color: #f9f9f9; border-radius: 5px;">
      <h3>PDF Metadata</h3>
      <div id="metadata-content">Loading metadata...</div>
    </div>
    <div id="pdf-container"></div>
  </div>

  <script type="module">
    import * as pdfjsLib from './node_modules/pdfjs-dist/build/pdf.min.mjs';
    window.pdfjsLib = pdfjsLib;
    pdfjsLib.GlobalWorkerOptions.workerSrc = './node_modules/pdfjs-dist/build/pdf.worker.min.mjs';
  </script>
  
  <script type="module" src="./app.js"></script>
</body>
</html>
