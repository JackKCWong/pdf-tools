<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Viewer with Pagination</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
    }
    .left-panel {
      flex: 0 0 350px;
    }
    .right-panel {
      flex: 1;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-right: 5px;
    }
    button:hover {
      background-color: #45a049;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .copy-btn.copied {
      background-color: #2196F3;
    }
    .copy-btn.copied::before {
      content: "✓";
      font-weight: bold;
    }
    .progress-container {
      width: 150px;
      height: 40px;
      margin-right: 5px;
      display: flex;
      align-items: center;
    }
    .progress-bar {
      width: 100%;
      height: 20px;
      background-color: #f0f0f0;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background-color: #4CAF50;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      position: absolute;
      font-size: 12px;
      color: white;
      text-align: center;
      width: 150px;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
    }
    #pdf-container {
      border: 1px solid #ddd;
      text-align: center;
      padding: 20px;
      min-height: 600px;
    }
    canvas {
      max-width: 100%;
      margin: 0 auto;
    }
    .pagination {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .pagination input {
      width: 60px;
      text-align: center;
      margin: 0 10px;
    }
    .page-info {
      margin: 0 10px;
    }
    #pdf-metadata {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #ddd;
      background-color: #f9f9f9;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>PDF Viewer with Pagination</h1>
  <div class="container">
    <div class="left-panel">
      <div class="form-group">
        <label for="file-upload">Select PDF file:</label>
        <input type="file" id="file-upload" accept=".pdf">
      </div>
      <div class="form-group">
        <label for="ocr-language">OCR Language:</label>
        <select id="ocr-language">
          <option value="eng">English</option>
          <option value="chi_sim">Chinese (Simplified)</option>
          <option value="chi_tra">Chinese (Traditional)</option>
          <option value="spa">Spanish</option>
          <option value="fra">French</option>
          <option value="deu">German</option>
          <option value="jpn">Japanese</option>
          <option value="kor">Korean</option>
          <option value="rus">Russian</option>
        </select>
      </div>
      <div class="form-group">
        <h3>Bounding Box</h3>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
          <div>
            <label for="top-left">Top-left (x, y):</label>
            <input type="text" id="top-left" placeholder="e.g., 100, 200">
          </div>
          <div>
            <label for="top-right">Top-right (x, y):</label>
            <input type="text" id="top-right" placeholder="e.g., 300, 200">
          </div>
          <div>
            <label for="bottom-left">Bottom-left (x, y):</label>
            <input type="text" id="bottom-left" placeholder="e.g., 100, 400">
          </div>
          <div>
            <label for="bottom-right">Bottom-right (x, y):</label>
            <input type="text" id="bottom-right" placeholder="e.g., 300, 400">
          </div>
        </div>
        <div style="margin-top: 10px;">
          <label for="unified-coords">Unified Coordinates [x1, y1, x2, y2, x3, y3, x4, y4]:</label>
          <input type="text" id="unified-coords" placeholder="e.g., 100, 200, 300, 200, 100, 400, 300, 400" style="width: 100%;">
        </div>
      </div>
      <div id="pdf-metadata">
        <h3>PDF Metadata</h3>
        <div id="metadata-content">Loading metadata...</div>
      </div>
    </div>
    <div class="right-panel">
      <div class="pagination">
        <button id="prev-page" disabled>Previous</button>
        <span class="page-info">Page <span id="current-page">1</span> of <span id="total-pages">0</span></span>
        <input type="number" id="page-input" value="1" min="1">
        <button id="next-page" disabled>Next</button>
        <button id="ocr-page" disabled>OCR Current Page</button>
        <div id="ocr-progress" class="progress-container" style="display: none;">
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <div class="progress-text">0%</div>
        </div>
      </div>
      <div id="pdf-container"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <!-- v5 -->
  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@7/dist/tesseract.min.js'></script>

  <script>
    // PDF rendering variables
    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let currentRenderTask = null;
    let isRendering = false;
    let drawRenderPending = false;

    // Bounding box coordinates
    let bboxCoordinates = {
      topLeft: null,
      topRight: null,
      bottomLeft: null,
      bottomRight: null
    };

    // Box drawing variables
    let isDrawing = false;
    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let currentY = 0;

    /**
     * Load a PDF document from the given URL
     */
    function loadPDF(pdfUrl) {
      const container = document.getElementById('pdf-container');
      container.innerHTML = 'Loading PDF...';

      const loadingTask = pdfjsLib.getDocument({
        url: pdfUrl,
        isEvalSupported: false,
        useSystemFonts: true,
        enableXfa: true
      });
      loadingTask.promise.then(function(pdf) {
        pdfDoc = pdf;
        totalPages = pdf.numPages;
        currentPage = 1;
        updatePagination(currentPage, totalPages);
        renderPage(currentPage);
        extractMetadata(pdf);
      }).catch(function(error) {
        container.innerHTML = 'Error loading PDF';
        console.error(error);
      });
    }

    /**
     * Render a specific page of the PDF
     */
    function renderPage(pageNum, drawBBox = false) {
      if (isRendering) return;
      
      const container = document.getElementById('pdf-container');
      container.innerHTML = '';

      // Cancel any ongoing render task
      if (currentRenderTask) {
        currentRenderTask.cancel();
        currentRenderTask = null;
      }

      pdfDoc.getPage(pageNum).then(function(page) {
        // Higher scale for better OCR quality
        const scale = 4.0;
        const viewport = page.getViewport({ scale: scale });

        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');

        // Optimize rendering settings for OCR
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = 'high';
        context.textBaseline = 'top';
        context.textRendering = 'optimizeLegibility';

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        canvas.style.width = '100%';
        canvas.style.height = 'auto';

        container.appendChild(canvas);

        window.canvas = canvas;
        window.context = context;
        window.viewport = viewport;
        window.currentPage = pageNum;

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        const renderContext = {
          canvasContext: context,
          viewport: viewport
        };

        isRendering = true;
        const renderTask = page.render(renderContext);
        currentRenderTask = renderTask;
        renderTask.promise.then(function() {
          isRendering = false;
          currentRenderTask = null;
          if (drawBBox) {
            drawBoundingBox(context);
          }

          document.getElementById('current-page').textContent = pageNum;
          document.getElementById('page-input').value = pageNum;
          updatePagination(pageNum, totalPages);
        }).catch(function(error) {
          isRendering = false;
          currentRenderTask = null;
          if (error.name !== 'RenderingCancelled') {
            console.error('Render error:', error);
          }
        });
      }).catch(function(error) {
        isRendering = false;
        container.innerHTML = 'Error rendering page';
        console.error(error);
      });
    }

    /**
     * Update pagination UI elements
     */
    function updatePagination(pageNum, total) {
      document.getElementById('current-page').textContent = pageNum;
      document.getElementById('total-pages').textContent = total;
      document.getElementById('page-input').value = pageNum;
      document.getElementById('page-input').max = total;

      document.getElementById('prev-page').disabled = pageNum <= 1;
      document.getElementById('next-page').disabled = pageNum >= total;
      document.getElementById('ocr-page').disabled = !pdfDoc;
    }

    /**
     * Preprocess image for better OCR results
     */
    function preprocessImage(canvas, cropRegion = null) {
      const tempCanvas = document.createElement('canvas');
      
      if (cropRegion) {
        const { x, y, width, height } = cropRegion;
        tempCanvas.width = width;
        tempCanvas.height = height;
      } else {
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
      }
      
      const tempContext = tempCanvas.getContext('2d');
      
      // Draw and crop if region is specified
      if (cropRegion) {
        const { x, y, width, height } = cropRegion;
        tempContext.drawImage(canvas, x, y, width, height, 0, 0, width, height);
      } else {
        tempContext.drawImage(canvas, 0, 0);
      }
      
      // 1. Convert to grayscale
      tempContext.filter = 'grayscale(100%)';
      tempContext.drawImage(tempCanvas, 0, 0);
      
      // 2. Apply thresholding
      const imageData = tempContext.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
      const data = imageData.data;
      
      for (let i = 0; i < data.length; i += 4) {
        const gray = data[i];
        const threshold = 128;
        const value = gray > threshold ? 255 : 0;
        data[i] = value;     // Red
        data[i + 1] = value; // Green
        data[i + 2] = value; // Blue
        // Alpha remains the same
      }
      
      tempContext.putImageData(imageData, 0, 0);
      
      // 3. Apply slight blur to reduce noise
      tempContext.filter = 'blur(0.5px)';
      tempContext.drawImage(tempCanvas, 0, 0);
      
      return tempCanvas;
    }

    /**
     * Perform OCR on the current page
     */
    async function performOCR() {
      const canvas = window.canvas;
      if (!canvas) {
        console.error('No canvas element found');
        return;
      }

      // Get UI elements
      const ocrButton = document.getElementById('ocr-page');
      const progressContainer = document.getElementById('ocr-progress');
      const progressFill = progressContainer.querySelector('.progress-fill');
      const progressText = progressContainer.querySelector('.progress-text');

      // Hide button and show progress bar
      ocrButton.style.display = 'none';
      progressContainer.style.display = 'flex';

      try {
        console.log('Starting OCR on page', currentPage);
        
        // Check if bounding box coordinates are set
        let cropRegion = null;
        const { topLeft, topRight, bottomLeft, bottomRight } = bboxCoordinates;
        if (topLeft && topRight && bottomLeft && bottomRight) {
          // Calculate crop region from bounding box
          const x = Math.min(topLeft[0], topRight[0], bottomLeft[0], bottomRight[0]);
          const y = Math.min(topLeft[1], topRight[1], bottomLeft[1], bottomRight[1]);
          const width = Math.max(topLeft[0], topRight[0], bottomLeft[0], bottomRight[0]) - x;
          const height = Math.max(topLeft[1], topRight[1], bottomLeft[1], bottomRight[1]) - y;
          
          if (width > 0 && height > 0) {
            cropRegion = { x, y, width, height };
            console.log('Using bounding box for OCR:', cropRegion);
          }
        }
        
        // Preprocess image for better OCR results
        const preprocessedCanvas = preprocessImage(canvas, cropRegion);
        
        // Convert canvas to data URL
        const imageData = preprocessedCanvas.toDataURL('image/png');
        
        // Get selected OCR language
        const selectedLanguage = document.getElementById('ocr-language').value;
        
        // Perform OCR using Tesseract.js
        let maxProgress = 0;
        const result = await Tesseract.recognize(
          imageData,
          selectedLanguage, // Selected language
          {
            logger: info => {
              console.log(info);
              // Update progress bar
              if (info.progress) {
                const progress = Math.round(info.progress * 100);
                // Only update if progress is greater than or equal to current max
                if (progress >= maxProgress) {
                  maxProgress = progress;
                  progressFill.style.width = `${progress}%`;
                  progressText.textContent = `${progress}%`;
                }
              }
            },
            // Optimized OCR parameters for better accuracy
            tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,!?;:-()[]{}',
            tessedit_pageseg_mode: 3, // Auto page segmentation with orientation and script detection
            tessedit_ocr_engine_mode: 3, // Default OCR engine mode
            preserve_interword_spaces: '1',
            user_defined_dpi: 300
          }
        );
        
        // Calculate confidence score
        let totalConfidence = 0;
        let wordCount = 0;
        
        if (result.data.words && result.data.words.length > 0) {
          result.data.words.forEach(word => {
            if (word.confidence !== undefined) {
              totalConfidence += word.confidence;
              wordCount++;
            }
          });
        }
        
        const averageConfidence = wordCount > 0 ? (totalConfidence / wordCount).toFixed(2) : 'N/A';
        
        // Show OCR results in modal
        const ocrModal = document.getElementById('ocr-modal');
        const ocrText = document.getElementById('ocr-text');
        const ocrConfidence = document.getElementById('ocr-confidence');
        
        ocrText.textContent = result.data.text;
        ocrConfidence.textContent = `${averageConfidence}%`;
        
        // Set confidence color based on score
        if (averageConfidence !== 'N/A') {
          const confidenceValue = parseFloat(averageConfidence);
          if (confidenceValue >= 90) {
            ocrConfidence.style.backgroundColor = '#e8f5e8'; // Green
            ocrConfidence.style.color = '#2e7d32';
          } else if (confidenceValue >= 70) {
            ocrConfidence.style.backgroundColor = '#fff8e1'; // Yellow
            ocrConfidence.style.color = '#ef6c00';
          } else {
            ocrConfidence.style.backgroundColor = '#ffebee'; // Red
            ocrConfidence.style.color = '#c62828';
          }
        }
        
        ocrModal.style.display = 'block';
      } catch (error) {
        console.error('OCR error:', error);
        alert('OCR failed. Check console for details.');
      } finally {
        // Restore button and hide progress bar
        ocrButton.style.display = 'inline-block';
        progressContainer.style.display = 'none';
        // Reset progress bar
        progressFill.style.width = '0%';
        progressText.textContent = '0%';
      }
    }

    /**
     * Validate bounding box input and update coordinates
     */
    function validateBBoxInput(id, value) {
      const coords = value.trim().split(',').map(Number);
      if (coords.length === 2 && !isNaN(coords[0]) && !isNaN(coords[1]) && coords[0] >= 0 && coords[1] >= 0) {
        switch(id) {
          case 'top-left':
            bboxCoordinates.topLeft = coords;
            break;
          case 'top-right':
            bboxCoordinates.topRight = coords;
            break;
          case 'bottom-left':
            bboxCoordinates.bottomLeft = coords;
            break;
          case 'bottom-right':
            bboxCoordinates.bottomRight = coords;
            break;
        }
      } else {
        switch(id) {
          case 'top-left':
            bboxCoordinates.topLeft = null;
            break;
          case 'top-right':
            bboxCoordinates.topRight = null;
            break;
          case 'bottom-left':
            bboxCoordinates.bottomLeft = null;
            break;
          case 'bottom-right':
            bboxCoordinates.bottomRight = null;
            break;
        }
      }

      const allCoordsValid = Object.values(bboxCoordinates).every(coord => coord !== null);
      if (allCoordsValid && pdfDoc) {
        renderPage(currentPage, true);
      }
    }

    /**
     * Validate unified coordinates input and update all bounding box coordinates
     */
    function validateUnifiedCoordsInput(value) {
      const coords = value.trim().split(',').map(Number);
      if (coords.length === 8 && coords.every(coord => !isNaN(coord) && coord >= 0)) {
        bboxCoordinates.topLeft = [coords[0], coords[1]];
        bboxCoordinates.topRight = [coords[2], coords[3]];
        bboxCoordinates.bottomLeft = [coords[4], coords[5]];
        bboxCoordinates.bottomRight = [coords[6], coords[7]];

        document.getElementById('top-left').value = `${coords[0]}, ${coords[1]}`;
        document.getElementById('top-right').value = `${coords[2]}, ${coords[3]}`;
        document.getElementById('bottom-left').value = `${coords[4]}, ${coords[5]}`;
        document.getElementById('bottom-right').value = `${coords[6]}, ${coords[7]}`;

        if (pdfDoc) {
          renderPage(currentPage, true);
        }
      }
    }

    /**
     * Draw bounding box on canvas
     */
    function drawBoundingBox(context) {
      const { topLeft, topRight, bottomLeft, bottomRight } = bboxCoordinates;

      if (topLeft && topRight && bottomLeft && bottomRight) {
        context.beginPath();
        context.moveTo(topLeft[0], topLeft[1]);
        context.lineTo(topRight[0], topRight[1]);
        context.lineTo(bottomRight[0], bottomRight[1]);
        context.lineTo(bottomLeft[0], bottomLeft[1]);
        context.closePath();
        context.strokeStyle = 'red';
        context.lineWidth = 2;
        context.stroke();
      }
    }

    /**
     * Handle mouse down event to start drawing
     */
    function startDrawing(e) {
      isDrawing = true;
      const canvas = window.canvas;
      if (!canvas) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      startX = Math.max(0, (e.clientX - rect.left) * scaleX);
      startY = Math.max(0, (e.clientY - rect.top) * scaleY);
      currentX = startX;
      currentY = startY;
    }

    /**
     * Handle mouse move event to draw the box
     */
    function draw(e) {
      if (!isDrawing) return;

      const canvas = window.canvas;
      if (!canvas) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      currentX = Math.max(0, (e.clientX - rect.left) * scaleX);
      currentY = Math.max(0, (e.clientY - rect.top) * scaleY);

      // Throttle render requests during drag
      if (isRendering) {
        drawRenderPending = true;
        return;
      }

      renderPageWithBox();
    }

    /**
     * Render current page with the dragging box
     */
    function renderPageWithBox() {
      if (isRendering || !pdfDoc || !currentPage) return;

      const context = window.context;
      if (!context) return;

      isRendering = true;
      drawRenderPending = false;

      pdfDoc.getPage(currentPage).then(function(page) {
        const renderContext = {
          canvasContext: context,
          viewport: window.viewport
        };
        const renderTask = page.render(renderContext);
        currentRenderTask = renderTask;

        renderTask.promise.then(function() {
          currentRenderTask = null;
          isRendering = false;

          // Draw the box
          context.beginPath();
          context.rect(startX, startY, currentX - startX, currentY - startY);
          context.strokeStyle = 'red';
          context.lineWidth = 2;
          context.stroke();

          // If another render was requested during this render, do it now
          if (drawRenderPending && isDrawing) {
            requestAnimationFrame(renderPageWithBox);
          }
        }).catch(function(error) {
          currentRenderTask = null;
          isRendering = false;
          if (error.name !== 'RenderingCancelled') {
            console.error('Render error:', error);
          }
        });
      }).catch(function(error) {
        isRendering = false;
        console.error('Page get error:', error);
      });
    }

    /**
     * Handle mouse up event to stop drawing and finalize the box
     */
    function stopDrawing() {
      if (!isDrawing) return;
      isDrawing = false;

      const x1 = Math.max(0, startX);
      const y1 = Math.max(0, startY);
      const x2 = Math.max(0, currentX);
      const y2 = Math.max(0, currentY);

      bboxCoordinates.topLeft = [x1, y1];
      bboxCoordinates.topRight = [x2, y1];
      bboxCoordinates.bottomLeft = [x1, y2];
      bboxCoordinates.bottomRight = [x2, y2];

      document.getElementById('top-left').value = `${x1.toFixed(0)}, ${y1.toFixed(0)}`;
      document.getElementById('top-right').value = `${x2.toFixed(0)}, ${y1.toFixed(0)}`;
      document.getElementById('bottom-left').value = `${x1.toFixed(0)}, ${y2.toFixed(0)}`;
      document.getElementById('bottom-right').value = `${x2.toFixed(0)}, ${y2.toFixed(0)}`;

      const unifiedCoords = `${x1.toFixed(0)}, ${y1.toFixed(0)}, ${x2.toFixed(0)}, ${y1.toFixed(0)}, ${x1.toFixed(0)}, ${y2.toFixed(0)}, ${x2.toFixed(0)}, ${y2.toFixed(0)}`;
      document.getElementById('unified-coords').value = unifiedCoords;

      renderPage(currentPage, true);
    }

    /**
     * Check if PDF has a text layer
     */
    async function hasTextLayer(pdf) {
      try {
        const pageNumsToCheck = Math.min(pdf.numPages, 3);

        for (let i = 1; i <= pageNumsToCheck; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();

          const hasText = content.items.some(item => {
            return item.str && item.str.trim().length > 0;
          });

          if (hasText) {
            return true;
          }
        }

        return false;
      } catch (error) {
        console.error('Error checking for text layer:', error);
        return false;
      }
    }

    /**
     * Extract all text from the PDF and count characters and words
     */
    async function extractTextStats(pdf) {
      try {
        let fullText = '';

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();

          const pageText = content.items.map(item => item.str || '').join(' ');
          fullText += pageText + ' ';
        }

        const charCount = fullText.replace(/\s/g, '').length;
        const words = fullText.trim().split(/\s+/).filter(word => word.length > 0);
        const wordCount = words.length;
        const hasText = charCount > 0;

        // Count tokens using js-tiktoken if text is available
        let tokenCount = 0;
        if (hasText) {
          try {
            const { getEncoding } = await import('https://cdn.jsdelivr.net/npm/js-tiktoken@1.0.21/+esm');
            const enc = getEncoding('cl100k_base');
            tokenCount = enc.encode(fullText).length;
          } catch (error) {
            console.error('Error tokenizing text:', error);
            tokenCount = 0;
          }
        }

        return { charCount, wordCount, tokenCount, hasText };
      } catch (error) {
        console.error('Error extracting text stats:', error);
        return { charCount: 0, wordCount: 0, tokenCount: 0, hasText: false };
      }
    }

    /**
     * Extract and display PDF metadata
     */
    function extractMetadata(pdf) {
      const metadataContent = document.getElementById('metadata-content');

      extractTextStats(pdf).then(function(stats) {
        let metadataHTML = '<table style="width: 100%; border-collapse: collapse;">';

        metadataHTML += `
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Text Layer:</td>
            <td style="padding: 8px; border: 1px solid #ddd;">${stats.hasText ? 'Yes' : 'No'}</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Characters:</td>
            <td style="padding: 8px; border: 1px solid #ddd;">${stats.charCount.toLocaleString()}</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Words:</td>
            <td style="padding: 8px; border: 1px solid #ddd;">${stats.wordCount.toLocaleString()}</td>
          </tr>
          <tr>
            <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Tokens:</td>
            <td style="padding: 8px; border: 1px solid #ddd;">${stats.tokenCount > 0 ? stats.tokenCount.toLocaleString() : 'N/A'}</td>
          </tr>
        `;

        pdf.getMetadata().then(function(data) {
          const info = data.info || {};

          const metadataFields = [
            { label: 'Title', key: 'Title' },
            { label: 'Author', key: 'Author' },
            { label: 'Subject', key: 'Subject' },
            { label: 'Keywords', key: 'Keywords' },
            { label: 'Creation Date', key: 'CreationDate' },
            { label: 'Modification Date', key: 'ModDate' },
            { label: 'Producer', key: 'Producer' },
            { label: 'Creator', key: 'Creator' }
          ];

          metadataFields.forEach(field => {
            if (info[field.key]) {
              metadataHTML += `
                <tr>
                  <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">${field.label}:</td>
                  <td style="padding: 8px; border: 1px solid #ddd;">${info[field.key]}</td>
                </tr>
              `;
            }
          });

          metadataHTML += `
            <tr>
              <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Page Count:</td>
              <td style="padding: 8px; border: 1px solid #ddd;">${pdf.numPages}</td>
            </tr>
          `;

          metadataHTML += '</table>';
          metadataContent.innerHTML = metadataHTML;
        }).catch(function(error) {
          metadataContent.innerHTML = 'Error extracting metadata';
          console.error(error);
        });
      }).catch(function(error) {
        metadataContent.innerHTML = 'Error extracting text stats';
        console.error(error);
      });
    }

    // Initialize the application
    function initApp() {
      document.getElementById('file-upload').addEventListener('change', function() {
        const file = this.files[0];

        if (file) {
          const fileURL = URL.createObjectURL(file);
          loadPDF(fileURL);
        }
      });

      const bboxInputs = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
      bboxInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', function() {
          validateBBoxInput(id, this.value);
        });
      });

      document.getElementById('unified-coords').addEventListener('input', function() {
        validateUnifiedCoordsInput(this.value);
      });

      document.getElementById('prev-page').addEventListener('click', function() {
        if (currentPage > 1) {
          currentPage--;
          renderPage(currentPage);
        }
      });

      document.getElementById('next-page').addEventListener('click', function() {
        if (currentPage < totalPages) {
          currentPage++;
          renderPage(currentPage);
        }
      });

      document.getElementById('page-input').addEventListener('change', function() {
        let pageNum = parseInt(this.value) || 1;
        if (pageNum < 1) pageNum = 1;
        if (pageNum > totalPages) pageNum = totalPages;
        currentPage = pageNum;
        this.value = pageNum;
        renderPage(pageNum);
      });

      document.getElementById('ocr-page').addEventListener('click', performOCR);

      // Modal close functionality
      document.getElementById('close-modal').addEventListener('click', function() {
        document.getElementById('ocr-modal').style.display = 'none';
      });

      document.getElementById('close-modal-btn').addEventListener('click', function() {
        document.getElementById('ocr-modal').style.display = 'none';
      });

      // Close modal when clicking outside
      window.addEventListener('click', function(event) {
        const modal = document.getElementById('ocr-modal');
        if (event.target === modal) {
          modal.style.display = 'none';
        }
      });

      // Copy to clipboard functionality
      document.getElementById('copy-to-clipboard').addEventListener('click', function() {
        const copyBtn = this;
        const ocrText = document.getElementById('ocr-text').textContent;
        navigator.clipboard.writeText(ocrText).then(function() {
          const originalText = copyBtn.textContent;
          copyBtn.classList.add('copied');
          copyBtn.textContent = 'Copied!';
          setTimeout(function() {
            copyBtn.classList.remove('copied');
            copyBtn.textContent = originalText;
          }, 2000);
        }).catch(function(err) {
          console.error('Failed to copy text: ', err);
          alert('Failed to copy text. Please try again.');
        });
      });
    }

    // Start the application when the DOM is loaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>

  <!-- OCR Results Modal -->
  <div id="ocr-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
    <div style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 800px; border-radius: 5px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>OCR Results</h2>
        <button id="close-modal" style="background: none; border: none; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</button>
      </div>
      <div style="margin-bottom: 10px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Confidence Score:</label>
        <div id="ocr-confidence" style="padding: 8px; background-color: #e8f5e8; border-radius: 3px; font-weight: bold;">Calculating...</div>
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Extracted Text:</label>
        <pre id="ocr-text" style="background-color: #f5f5f5; padding: 10px; border-radius: 3px; max-height: 400px; overflow-y: auto; white-space: pre-wrap;"></pre>
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 10px;">
        <button id="copy-to-clipboard" class="copy-btn" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 3px;">Copy to Clipboard</button>
        <button id="close-modal-btn" style="padding: 10px 20px; background-color: #f44336; color: white; border: none; cursor: pointer; border-radius: 3px;">Close</button>
      </div>
    </div>
  </div>
</body>
</html>
